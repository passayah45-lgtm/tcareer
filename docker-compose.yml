services:
  db:
    image: postgres:16-alpine
    container_name: tcareer_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tcareer}
      POSTGRES_USER: ${POSTGRES_USER:-tcareer_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tcareer_pass}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tcareer_user} -d ${POSTGRES_DB:-tcareer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tcareer_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-tcareer_redis_pass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-tcareer_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tcareer_api
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tcareer_worker
    restart: unless-stopped
    command: celery -A tasks.celery worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tcareer_beat
    restart: unless-stopped
    command: celery -A tasks.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

volumes:
  postgres_data:
  redis_data:
