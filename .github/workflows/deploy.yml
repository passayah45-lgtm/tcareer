name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to deploy"
        required: false
        default: "main"

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy T-Career to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Validate deployment secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_DEPLOY_PATH"
          test -n "${{ secrets.VPS_SSH_KEY }}"

      - name: Install SSH and rsync tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rsync openssh-client

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/tcareer_vps_key
          chmod 600 ~/.ssh/tcareer_vps_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync source to VPS
        run: |
          ssh -i ~/.ssh/tcareer_vps_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$VPS_DEPLOY_PATH'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/tcareer_vps_key -p ${VPS_PORT:-22}" \
            --exclude ".git/" \
            --exclude ".env" \
            --exclude ".env.production" \
            --exclude ".env.local" \
            --exclude ".env.staging" \
            --exclude "backend/db.sqlite3" \
            --exclude "backend/media/" \
            --exclude "backend/staticfiles/" \
            --exclude "frontend/.env.local" \
            --exclude "frontend/.next/" \
            --exclude "frontend/node_modules/" \
            --exclude "frontend/.npm-cache/" \
            ./ "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/"

      - name: Build and start services
        run: |
          ssh -i ~/.ssh/tcareer_vps_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "VPS_DEPLOY_PATH='$VPS_DEPLOY_PATH' bash -s" << 'EOF'
          set -euo pipefail
          cd "$VPS_DEPLOY_PATH"
          test -f .env.production
          docker compose --env-file .env.production -f docker-compose.prod.yml build
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d db redis
          docker compose --env-file .env.production -f docker-compose.prod.yml run --rm web python manage.py migrate --noinput
          docker compose --env-file .env.production -f docker-compose.prod.yml run --rm web python manage.py collectstatic --noinput
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d
          docker compose --env-file .env.production -f docker-compose.prod.yml exec -T web python manage.py production_smoke_check
          docker compose --env-file .env.production -f docker-compose.prod.yml ps
          EOF
