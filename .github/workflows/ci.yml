name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Run backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tcareer_test
          POSTGRES_USER: tcareer_test_user
          POSTGRES_PASSWORD: tcareer_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgresql://tcareer_test_user:tcareer_test_pass@localhost:5432/tcareer_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      AWS_ACCESS_KEY_ID: test-key
      AWS_SECRET_ACCESS_KEY: test-secret
      AWS_REGION: ap-south-1
      AWS_S3_BUCKET_NAME: test-bucket
      GOOGLE_OAUTH_CLIENT_ID: test-google-client-id
      GOOGLE_OAUTH_CLIENT_SECRET: test-google-secret
      OPENAI_API_KEY: test-openai-key
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements/development.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpq-dev \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-xlib-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements/development.txt

      - name: Run database migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Check migration drift
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django deploy checks
        working-directory: backend
        run: python manage.py check --deploy

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest \
            --cov=apps \
            --cov=common \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Run release candidate check
        working-directory: backend
        run: python manage.py release_candidate_check --json

      - name: Validate provider configuration in safe mode
        working-directory: backend
        run: python manage.py validate_production_providers --json

      - name: Run retention policy dry run
        working-directory: backend
        run: python manage.py run_retention_policies --dry-run --json

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint dependencies
        run: pip install ruff==0.5.5 pyright==1.1.375

      - name: Run ruff critical checks
        working-directory: backend
        run: ruff check . --select E9,F63,F7,F82

  frontend:
    name: Frontend install, build, lint, and type check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check frontend
        working-directory: frontend
        run: npm run type-check

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        working-directory: backend
        run: pip-audit -r requirements/production.txt --ignore-vuln PYSEC-2023-62 --ignore-vuln PYSEC-2026-3412
