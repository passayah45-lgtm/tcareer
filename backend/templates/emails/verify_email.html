<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify your email</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f3f4f6; margin: 0; padding: 24px 0; }
    .wrapper { max-width: 560px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; overflow: hidden; }
    .header { background: #1a1a2e; padding: 28px 36px; }
    .header p { color: #fff; font-size: 20px; font-weight: 600; margin: 0; }
    .body { padding: 36px; }
    p { font-size: 15px; color: #4b5563; line-height: 1.65; margin: 0 0 16px; }
    .cta { display: inline-block; background: #4f46e5; color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; margin: 8px 0 24px; }
    .footer { padding: 20px 36px; border-top: 1px solid #f3f4f6; }
    .footer p { font-size: 12px; color: #9ca3af; margin: 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header"><p>T-Career</p></div>
      <div class="body">
        <p>Hi {{ user.get_short_name }},</p>
        <p>Click the button below to verify your email address and activate your account.</p>
        <a href="{{ verify_url }}" class="cta">Verify email address</a>
        <p style="font-size:13px;color:#6b7280;">This link expires in {{ expiry_hours }} hours. If you did not create an account, ignore this email.</p>
      </div>
      <div class="footer"><p>T-Career - AI-powered learning and career development.</p></div>
    </div>
  </div>
</body>
</html>
