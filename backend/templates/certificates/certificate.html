<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @page { size: A4 landscape; margin: 0; }
    body { font-family: Georgia, serif; background: #fff; width: 297mm; height: 210mm; display: flex; align-items: center; justify-content: center; }
    .certificate { width: 280mm; height: 194mm; border: 3px solid #1a1a2e; padding: 14mm 20mm; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .certificate::before { content: ""; position: absolute; top: 5mm; left: 5mm; right: 5mm; bottom: 5mm; border: 1px solid #4f46e5; pointer-events: none; }
    .brand { font-family: sans-serif; font-size: 11pt; color: #4f46e5; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 5mm; }
    .headline { font-size: 9pt; color: #6b7280; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 7mm; }
    .certifies-text { font-size: 10pt; color: #6b7280; font-style: italic; margin-bottom: 3mm; }
    .student-name { font-size: 28pt; color: #111827; font-weight: bold; margin-bottom: 5mm; line-height: 1.2; }
    .completion-text { font-size: 9pt; color: #6b7280; margin-bottom: 3mm; }
    .course-title { font-size: 16pt; color: #1a1a2e; font-weight: bold; margin-bottom: 7mm; line-height: 1.3; max-width: 200mm; }
    .date { font-size: 9pt; color: #9ca3af; margin-bottom: 8mm; letter-spacing: 1px; }
    .footer-row { display: flex; align-items: flex-end; justify-content: space-between; width: 100%; border-top: 0.5px solid #e5e7eb; padding-top: 5mm; margin-top: auto; }
    .cert-label { font-family: sans-serif; font-size: 6.5pt; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.5mm; }
    .cert-number { font-family: monospace; font-size: 8pt; color: #4f46e5; font-weight: bold; }
    .qr-section { display: flex; flex-direction: column; align-items: center; gap: 1.5mm; }
    .qr-section img { width: 18mm; height: 18mm; }
    .qr-label { font-family: sans-serif; font-size: 6pt; color: #9ca3af; text-transform: uppercase; }
    .signature-section { text-align: center; }
    .signature-line { width: 35mm; border-top: 1px solid #374151; margin: 0 auto 2mm; }
    .signature-name { font-family: sans-serif; font-size: 8pt; color: #374151; font-weight: 600; }
    .signature-title { font-family: sans-serif; font-size: 7pt; color: #9ca3af; margin-top: 1mm; }
  </style>
</head>
<body>
  <div class="certificate">
    <div class="brand">T-Career</div>
    <div class="headline">Certificate of Completion</div>
    <div class="certifies-text">This certifies that</div>
    <div class="student-name">{{ student_name }}</div>
    <div class="completion-text">has successfully completed the course</div>
    <div class="course-title">{{ course_title }}</div>
    <div class="date">Issued on {{ issued_date }}</div>
    <div class="footer-row">
      <div class="cert-info">
        <div class="cert-label">Certificate ID</div>
        <div class="cert-number">{{ cert_number }}</div>
      </div>
      <div class="signature-section">
        <div class="signature-line"></div>
        <div class="signature-name">T-Career Platform</div>
        <div class="signature-title">AI-Powered Learning</div>
      </div>
      <div class="qr-section">
        <img src="data:image/png;base64,{{ qr_base64 }}" alt="Verify certificate">
        <div class="qr-label">Scan to verify</div>
      </div>
    </div>
  </div>
</body>
</html>
