[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    ".git",
    "__pycache__",
    "migrations",
    ".venv",
    "staticfiles",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # flake8-bandit (security)
    "DJ",  # flake8-django
]
ignore = [
    "S101",  # assert is fine in tests
    "S105",  # hardcoded passwords - false positives in test fixtures
    "S106",
    "B008",  # function calls in default args (DRF uses this)
    "N806",  # variable in function should be lowercase (false positives)
]

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["S", "N"]
"*/migrations/*" = ["N", "E501"]
"conftest.py" = ["S"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "common", "config", "services", "tasks"]
